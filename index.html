<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>Trello ID Tools Power-Up</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="connector-page">
    <main class="connector-shell" aria-label="Trello Power-Up connector">
      <img src="./icons/icon.png" alt="" width="16" height="16" />
      <h1>Trello ID Tools</h1>
      <p>This page is the Trello Power-Up iframe connector.</p>
    </main>

    <!-- Hidden input used by auto-copy mode to write to clipboard
         from the connector page context, which is not sandbox-restricted. -->
    <input id="auto-copy-input"
           type="text"
           readonly
           aria-hidden="true"
           style="position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none;" />

    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script src="./power-up.js"></script>
  </body>
</html>
